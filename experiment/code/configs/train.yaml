# PSSA Phase-2 training config (defaults: LIBERO-Spatial)
out_dir: experiment/runs/pssa_train-${now:%Y%m%d-%H%M%S}

data:
  suite: libero_spatial
  root: /root/autodl-tmp/datasets
  window_len: 16          # frames per training window
  n_init_frames: 4        # T0 frames to seed PSE-Tok
  num_workers: 2
  # SAM-2 per-frame masks for §5.6 follow-up 1 (operational XTC). When
  # false, the dataset yields all-ones placeholder masks and XTC collapses
  # to ~0 — keep false to reproduce v2c baselines.
  use_sam2_masks: false
  sam2_cache_dir: /root/autodl-tmp/sam2_cache

model:
  id: openvla/openvla-7b-finetuned-libero-spatial
  freeze_backbone: true
  lambda_xtc: 0.1
  pse_position: after_image   # or before_action
  lora:
    enable: true
    r: 32
    alpha: 64
    dropout: 0.05
  pse:
    n_entities: 8             # 0 = no-PSE control
    hidden_dim: 4096          # match LLM hidden
    cnn_dim: 256

train:
  batch_size: 4
  grad_accum_steps: 1
  lr: 2.0e-4
  weight_decay: 0.01
  grad_clip: 1.0
  max_steps: 30000
  log_every: 50
  save_every: 2000

wandb:
  enable: false
  project: pssa-vla
  entity: null

seed: 0
